services:
  webex-status-bot:
    build: .
    container_name: collab-alert-bot
    env_file: bot.env          # WEBEX_BOT_TOKEN, WEBEX_ROOM_ID
    environment:
      POLL_SECONDS: "120"
      INC_STATE_FILE: /data/inc_seen.json
      SEC_STATE_FILE: /data/sec_seen.json
    volumes:
      - bot-state:/data        # seen.json survives restarts
    restart: unless-stopped

volumes:
  bot-state: